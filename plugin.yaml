name: captcha-solver-mcp
version: 0.1.0
description: |
  Containerized CAPTCHA solver wired into Hermes as an MCP. Handles reCAPTCHA v2,
  reCAPTCHA v3, hCaptcha (public + Enterprise), Cloudflare Turnstile, and
  Cloudflare Managed Challenge. Runs its own Camoufox (stealth Firefox) browser
  internally and calls a strong vision model on OpenRouter (Qwen3-VL-235B by
  default). Returns either a response token (reCAPTCHA/hCaptcha/Turnstile) or
  cf_clearance cookie + user-agent (CF Managed Challenge).

  Built to replace the agent-driven "screenshot + zai-vision loop" path, which
  is functional but takes minutes per solve. This solver completes a reCAPTCHA
  v2 in ~15-30s.
entrypoint: __init__.py
author: spawdog
license: MIT
