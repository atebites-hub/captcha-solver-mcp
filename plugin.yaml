name: captcha-solver-mcp
version: 0.2.0
description: |
  CAPTCHA tile classifier exposed as a Hermes MCP. Takes per-tile screenshots
  plus a target ("crosswalks", "buses", ...) and returns which tile indices
  contain the target. Backed by Z.AI glm-5v-turbo (Coding-plan Vision
  Understanding pool — zero incremental cost via the X-Title hack).

  The agent drives its own Camofox browser end-to-end; this plugin only does
  vision classification. See skills/captcha-solver/SKILL.md for the agent-side
  workflow (snapshot → per-tile screenshots → classify → click).
entrypoint: __init__.py
author: spawdog
license: MIT
